name: Update Dashboard

on:
  schedule:
    # 5:00 UTC = 8:00 EEST (Kyiv summer), 7:00 EET (Kyiv winter)
    - cron: "0 5 * * *"
  workflow_dispatch: # allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install google-cloud-bigquery db-dtypes pyarrow pandas

      - name: Generate dashboard
        env:
          GCP_KEY_JSON: ${{ secrets.GCP }}
        run: python generate_dashboard.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.html
          git diff --staged --quiet || (git commit -m "Auto-update dashboard data $(date -u +%Y-%m-%d)" && git push)
